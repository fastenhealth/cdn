name: Dev-Deploy

on:
  push:
    branches: [cloud-front-dev-ready]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-s3:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      deployments: write

    env:
      AWS_REGION: us-east-1
      DEPLOY_BUCKET: cdn-dev-cdndevd19d6ae1-o7wfoaf1dm4u
      CLOUDFRONT_ID: E2K8V8GC6OC61N

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::545217748721:role/cdn-gh-s3-dev-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload CDN assets to S3
        run: |
          aws s3 sync images/ "s3://$DEPLOY_BUCKET/images/" --delete

          # Upload root index.html
          aws s3 cp index.html "s3://$DEPLOY_BUCKET/index.html"

      - name: Bust CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"

      - uses: chrnorm/deployment-action@v2
        name: Create GitHub deployment
        id: deployment
        with:
          token: "${{ github.token }}"
          environment: dev
          initial-status: success
